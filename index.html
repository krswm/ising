<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Ising Model</title>
    <link rel="stylesheet" href="style.css" />

    <!-- KaTeX -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.28/dist/katex.min.css"
      integrity="sha384-Wsr4Nh3yrvMf2KCebJchRJoVo1gTU6kcP05uRSh5NV3sj9+a8IomuJoQzf3sMq4T"
      crossorigin="anonymous"
    >
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/katex@0.16.28/dist/katex.min.js"
      integrity="sha384-+W9OcrYK2/bD7BmUAk+xeFAyKp0QjyRQUCxeU31dfyTt/FrPsUgaBTLLkVf33qWt"
      crossorigin="anonymous"
    >
    </script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/katex@0.16.28/dist/contrib/auto-render.min.js"
      integrity="sha384-hCXGrW6PitJEwbkoStFjeJxv+fSOOQKOPbJxSfM6G5sWZjAyWhXiTIIAmQqnlLlh"
      crossorigin="anonymous"
      onload="renderMathInElement(document.body);"
    ></script>
  </head>
  <body>
    <div id="controller">
      <div>
        <h1>Ising Model</h1>
        <h2>with the Monte Carlo Method</h2>
      </div>
      <div>
        <h2>Statistics</h2>
        <p>Magnetization</p>
        <p id="MDisplay"></p>
        <p>Energy</p>
        <p id="UDisplay"></p>
      </div>
      <div>
        <h2>Model</h2>
        <select
          id="model" onchange="changeModelP(true);">
          <option value="ising">Ising model</option>
          <option value="xy">XY model</option>
        </select>
        <p id="modelP"></p>
        <label>
          Width \(X\)
          <input id="X" type="number" min="1" value="64" />
        </label>
        <label>
          Height \(Y\)
          <input id="Y" type="number" min="1" value="64" />
        </label>
        <button id="startButton" onclick="model.start();">
          Apply
        </button> 
      </div>
      <div>
        <h2>Parameters</h2>
        <label>
          Temperature \(k_{\mathrm{B}} T\)
          <input id="kT" type="number" min="0" step="0.1" value="2.5" />
        </label>
        <label>
          Interaction \(J_{\substack{\Delta x \\ \Delta y}}\)
          <div id="JInput">
            <div></div>
            <div>\(\cdots\)</div>
            <div>\(- 1\)</div>
            <div>\(0\)</div>
            <div>\(1\)</div>
            <div>\(\cdots\)</div>
            <div>\(\Delta x\)</div>

            <div>\(\vdots\)</div>
            <input value="0" disabled />
            <input value="0" disabled />
            <input value="0" disabled />
            <input value="0" disabled />
            <input value="0" disabled />
            <div></div>

            <div>\(- 1\)</div>
            <input value="0" disabled />
            <input id="mm" type="number" value="0" />
            <input id="zm" type="number" value="-1" />
            <input id="pm" type="number" value="0" />
            <input value="0" disabled />
            <div></div>

            <div>\(0\)</div>
            <input value="0" disabled />
            <input id="mz" type="number" value="-1" />
            <input id="zz" type="number" value="0" />
            <input id="pz" type="number" value="-1" />
            <input value="0" disabled />
            <div></div>

            <div>\(1\)</div>
            <input value="0" disabled />
            <input id="mp" type="number" value="0" />
            <input id="zp" type="number" value="-1" />
            <input id="pp" type="number" value="0" />
            <input value="0" disabled />
            <div></div>

            <div>\(\vdots\)</div>
            <input value="0" disabled />
            <input value="0" disabled />
            <input value="0" disabled />
            <input value="0" disabled />
            <input value="0" disabled />
            <div></div>

            <div>\(\Delta y\)</div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
          </div>
        </label>
        <label id="hLabel">
          Field \(h\)
          <input id="h" type="number" step="0.1" value="0" />
        </label>
        <label id="coloringLabel">
          Coloring
          <select id="coloring">
            <option value="normal">normal</option>
            <option value="curl">curl</option>
          </select>
        </label>
        <div id="img"><img src="xy.svg" width="160"></img></div>
        <label>
          Proposals per 1ms
          <input id="speed" type="number" min="1" value="1000" />
        </label>
        <button id="playPause">Pause</button> 
      </div>
    </div>
    <div id="visualizer">
      <canvas id="canvas">Ising model</canvas>
    </div>
    <script src="script.js"></script>
  </body>
</head>
